<!DOCTYPE html>
<html>
  <head><title>Registration</title></head>
  <body>
    <form name="registration" data-netlify="true" netlify-honeypot="bot-field">
      <input type="text" name="qualification" />
      <input type="text" name="employmentType" />
      <input type="text" name="name" />
      <input type="text" name="furigana" />
      <input type="tel" name="tel" />
      <input type="email" name="email" />
      <textarea name="remarks"></textarea>
      <button type="submit">送信</button>
    </form>
  <script data-hoiku-blognav="1">(function(){function add(){var refs=document.querySelectorAll('a[href="/company"]');refs.forEach(function(ref){var p=ref.parentElement; if(!p) return;if(p.querySelector('a[href="/blog"]')) return;var a=ref.cloneNode(true);a.setAttribute("href","/blog");a.textContent="ブログ";p.insertBefore(a, p.firstChild);});}if(document.readyState!=="loading"){setTimeout(add,300);}document.addEventListener("DOMContentLoaded",function(){setTimeout(add,300);});var n=0,t=setInterval(function(){add(); if(++n>=10) clearInterval(t);},400);try{new MutationObserver(function(){add();}).observe(document.documentElement,{childList:true,subtree:true});}catch(e){}})();</script></body>
</html>
