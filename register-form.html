<!DOCTYPE html>
<html>
  <head><title>Registration</title></head>
  <body>
    <form name="registration" data-netlify="true" netlify-honeypot="bot-field">
      <input type="text" name="qualification" />
      <input type="text" name="employmentType" />
      <input type="text" name="name" />
      <input type="text" name="furigana" />
      <input type="tel" name="tel" />
      <input type="email" name="email" />
      <textarea name="remarks"></textarea>
      <button type="submit">送信</button>
    </form>
  <script data-hoiku-nav2="1">(function(){function ensureBlog(c){if(!c) return;if(c.querySelector('a[href="/blog"]')) return;var ref=c.querySelector('a[href="/company"]')||c.querySelector("a");if(!ref) return;var a=ref.cloneNode(true);a.setAttribute("href","/blog");a.textContent="ブログ";c.appendChild(a);}function build(){var nav=document.querySelector('nav.hidden.lg\\:flex');if(nav){ensureBlog(nav);var wrap=nav.parentElement;if(!wrap||!wrap.hasAttribute("data-hoiku-2row")){var w=document.createElement("div");w.setAttribute("data-hoiku-2row","1");w.className="hidden md:flex";nav.parentNode.insertBefore(w,nav);w.appendChild(nav);var reg=document.querySelector('a[href="/register"]');var cta=reg?reg.parentElement:null;if(cta&&cta!==w) w.appendChild(cta);wrap=w;}wrap.style.flexDirection="column";wrap.style.alignItems="flex-end";wrap.style.gap="8px";var navEl=wrap.querySelector("nav"); if(navEl){navEl.style.justifyContent="flex-end";}var reg2=wrap.querySelector('a[href="/register"]'); if(reg2&&reg2.parentElement!==wrap){reg2.parentElement.style.justifyContent="flex-end";reg2.parentElement.style.alignSelf="flex-end";}}var cs=document.querySelectorAll('a[href="/company"]');cs.forEach(function(ref){var p=ref.parentElement;if(!p) return;if(p.matches&&p.matches('nav.hidden.lg\\:flex')) return;ensureBlog(p);});}function boot(){setTimeout(build,300);}if(document.readyState!=="loading"){boot();}document.addEventListener("DOMContentLoaded",boot);var n=0,t=setInterval(function(){build(); if(++n>=12) clearInterval(t);},350);try{new MutationObserver(function(){build();}).observe(document.documentElement,{childList:true,subtree:true});}catch(e){}})();</script></body>
</html>
